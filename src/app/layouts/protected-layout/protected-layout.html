<div class="app-shell">
  <header class="app-header">
    <a class="brand" routerLink="/home">UniBook Starter</a>

    <nav class="app-nav" aria-label="Navigazione principale">
      <a routerLink="/home" routerLinkActive="nav-link--active" class="nav-link">Home</a>
      <a routerLink="/search" routerLinkActive="nav-link--active" class="nav-link">Cerca</a>
      <a routerLink="/profile" routerLinkActive="nav-link--active" class="nav-link">Profilo</a>
      @if (currentUser(); as user) {
      <p class="user-chip">{{ user.firstName }} {{ user.lastName }}</p>
      }
      <button type="button" class="logout-button" (click)="logout()">Logout</button>
    </nav>
  </header>

  <main class="app-main">
    <router-outlet />
  </main>
</div>
